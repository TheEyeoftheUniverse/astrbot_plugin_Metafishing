<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录完成 - MetaFishing！</title>
    <link href="{{ url_for('player_bp.static', filename='vendor/bootswatch/litera.bootstrap.min.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('player_bp.static', filename='vendor/fontawesome/css/all.min.css') }}">
</head>
<body class="bg-body-tertiary">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="display-5 text-success mb-3">
                        <i class="fas fa-circle-check"></i>
                    </div>
                    <h1 class="h3 mb-3">Linux.do 登录已完成</h1>
                    <p class="text-muted mb-2">当前账号已绑定到游戏用户 <strong>{{ nickname }}</strong>（{{ linked_user_id }}）。</p>
                    {% if unity_ticket_ready %}
                    <p class="text-muted mb-4">游戏会自动同步登录状态，你现在可以返回 Unity 客户端继续操作。</p>
                    {% else %}
                    <p class="text-muted mb-4">浏览器登录已经完成，但游戏同步票据未生成，请回到游戏后重新发起一次登录。</p>
                    {% endif %}
                    <p id="closeFallback" class="alert alert-info d-none mb-3">
                        当前浏览器禁止网页主动关闭窗口。Unity 已经能同步登录结果，请直接切回游戏或使用系统返回键。
                    </p>
                    <div class="d-flex flex-column gap-2">
                        <button type="button" class="btn btn-success" onclick="closeLoginPage()">
                            <i class="fas fa-door-open"></i> 关闭当前页面 / 返回游戏
                        </button>
                        <a href="{{ url_for('player_bp.index') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-globe"></i> 改为进入玩家 WebUI
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script>
function showCloseFallback() {
    var fallback = document.getElementById('closeFallback');
    if (fallback) {
        fallback.classList.remove('d-none');
    }
}

function closeLoginPage() {
    try {
        window.open('', '_self');
        window.close();
    } catch (error) {
        // Some mobile browsers reject scripted window closing for OAuth redirects.
    }

    window.setTimeout(function () {
        if (!document.hidden) {
            showCloseFallback();
        }
    }, 300);
}

window.setTimeout(closeLoginPage, 1500);
</script>
</body>
</html>
